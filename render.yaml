services:
  - type: web
    name: strideos-social
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DRY_RUN
        value: "true"
      - key: QUEUE_PATH
        value: /var/data/queue.json
      - key: PUBLISH_INTERVAL_MINUTES
        value: "15"
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: API_TOKEN
        generateValue: true
      - key: X_USER_ACCESS_TOKEN
        sync: false
      - key: X_REFRESH_TOKEN
        sync: false
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: TARGET_X_HANDLES
        value: gregisenberg,noahkagan,george__mack,buildinpublic,openai,perplexity_ai,AnthropicAI
      - key: REDDIT_SUBREDDITS
        value: SaaS,startups,Entrepreneur,SideProject,indiehackers
      - key: REDDIT_SEARCH_QUERIES
        value: solo founder,build in public,SaaS metrics,AI agents startup,distribution
      - key: PLAUSIBLE_API_KEY
        sync: false
      - key: PLAUSIBLE_SITE_ID
        sync: false
      - key: POSTHOG_PERSONAL_API_KEY
        sync: false
      - key: POSTHOG_PROJECT_ID
        sync: false
    disk:
      name: strideos-social-data
      mountPath: /var/data
      sizeGB: 1
