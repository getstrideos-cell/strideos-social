services:
  - type: web
    name: strideos-social
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DRY_RUN
        value: "true"
      - key: QUEUE_PATH
        value: /var/data/queue.json
      - key: PUBLISH_INTERVAL_MINUTES
        value: "15"
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: API_TOKEN
        generateValue: true
      - key: X_USER_ACCESS_TOKEN
        sync: false
    disk:
      name: strideos-social-data
      mountPath: /var/data
      sizeGB: 1
